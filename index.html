<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL SMASH - Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0F0F11', 800: '#1A1A1E', 700: '#25252B', 600: '#2E2E36', 500: '#3A3A44' },
                        accent: { DEFAULT: '#F59E0B', light: '#FBBF24', dark: '#D97706', glow: 'rgba(245,158,11,0.3)' },
                        success: '#10B981', danger: '#EF4444',
                    },
                    fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
                    boxShadow: { 'accent-glow': '0 0 20px rgba(245,158,11,0.3)', 'card': '0 4px 20px rgba(0,0,0,0.4)', 'float': '0 8px 32px rgba(0,0,0,0.5)' }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
        body { background-color: #0F0F11; font-family: 'Inter',system-ui,sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3A3A44; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #F59E0B; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 5px rgba(16,185,129,0.5); } 50% { box-shadow: 0 0 15px rgba(16,185,129,0.8); } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
        .status-glow { animation: pulse-glow 2s infinite; }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .menu-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .menu-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,158,11,0.1); }
        .category-tab { transition: all 0.3s ease; position: relative; }
        .category-tab.active { background: linear-gradient(135deg,#F59E0B,#D97706); color: #0F0F11; font-weight: 700; box-shadow: 0 4px 15px rgba(245,158,11,0.4); }
        .category-tab.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: #F59E0B; border-radius: 50%; }
        .toggle-btn { transition: all 0.2s ease; }
        .toggle-btn.active { background: linear-gradient(135deg,#F59E0B,#D97706); color: #0F0F11; font-weight: 600; box-shadow: 0 2px 10px rgba(245,158,11,0.3); }
        .search-input:focus { box-shadow: 0 0 0 3px rgba(245,158,11,0.2); border-color: #F59E0B; }
        @keyframes badge-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .badge-pulse { animation: badge-pulse 0.3s ease; }
        .stagger-1 { animation-delay: 0.05s; } .stagger-2 { animation-delay: 0.1s; } .stagger-3 { animation-delay: 0.15s; } .stagger-4 { animation-delay: 0.2s; } .stagger-5 { animation-delay: 0.25s; } .stagger-6 { animation-delay: 0.3s; } .stagger-7 { animation-delay: 0.35s; } .stagger-8 { animation-delay: 0.4s; }
        .glass { background: rgba(26,26,30,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .price-tag { background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05)); border: 1px solid rgba(245,158,11,0.3); }
        .cart-drawer { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
        .cart-drawer.open { transform: translateY(0); }
        .cart-drawer.closed { transform: translateY(100%); }
        .overlay { transition: opacity 0.3s ease; }
        .overlay.hidden { opacity: 0; pointer-events: none; }
        .overlay.visible { opacity: 1; pointer-events: auto; }
        .qty-btn { transition: all 0.15s ease; }
        .qty-btn:active { transform: scale(0.9); }
        .add-btn { transition: all 0.2s ease; }
        .add-btn:active { transform: scale(0.95); }
        .section-title::after { content: ''; display: block; width: 40px; height: 3px; background: linear-gradient(90deg,#F59E0B,transparent); margin-top: 8px; border-radius: 2px; }
        html { scroll-behavior: smooth; }
        body.cart-open { overflow: hidden; }
        .item-img { object-fit: cover; transition: transform 0.4s ease; }
        .menu-card:hover .item-img { transform: scale(1.05); }
        .img-overlay { background: linear-gradient(to top, rgba(15,15,17,0.9) 0%, rgba(15,15,17,0.3) 50%, transparent 100%); }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen pb-28">

<!-- Header -->
<header class="sticky top-0 z-40 glass border-b border-dark-600/50">
    <div class="max-w-lg mx-auto px-4 py-3">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center shadow-accent-glow">
                    <i data-lucide="flame" class="w-5 h-5 text-dark-900"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white">EL SMASH</h1>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">Burger & Grill</p>
                </div>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-dark-700/80 border border-success/20">
                <span class="w-2 h-2 rounded-full bg-success status-glow"></span>
                <span class="text-xs font-semibold text-success">Open Now</span>
            </div>
        </div>
        <div class="relative">
            <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
            <input type="text" id="searchInput" placeholder="Search menu items..." class="search-input w-full bg-dark-700/80 border border-dark-600 rounded-xl py-2.5 pl-10 pr-10 text-sm text-white placeholder-gray-500 focus:outline-none transition-all">
            <button id="clearSearch" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white hidden"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
    </div>
</header>

<!-- Category Navigation -->
<nav class="sticky top-[105px] z-30 bg-dark-900/95 backdrop-blur-md border-b border-dark-600/30">
    <div class="max-w-lg mx-auto">
        <div class="flex gap-2 px-4 py-3 overflow-x-auto hide-scrollbar" id="categoryNav">
            <button class="category-tab active whitespace-nowrap px-4 py-2 rounded-full text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600" data-category="all">All Items</button>
            <button class="category-tab whitespace-nowrap px-4 py-2 rounded-full text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600" data-category="burgers">Burgers & Meals</button>
            <button class="category-tab whitespace-nowrap px-4 py-2 rounded-full text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600" data-category="sandwiches">Long Sandwiches</button>
            <button class="category-tab whitespace-nowrap px-4 py-2 rounded-full text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600" data-category="pizza">Pizza</button>
            <button class="category-tab whitespace-nowrap px-4 py-2 rounded-full text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600" data-category="supplements">Supplements</button>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="max-w-lg mx-auto px-4 pt-6" id="menuContent"></main>

<!-- Floating Cart Button -->
<div id="cartFAB" class="fixed bottom-6 right-4 z-50 hidden">
    <button onclick="toggleCart()" class="add-btn w-14 h-14 rounded-full bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center shadow-float float-animation relative">
        <i data-lucide="receipt" class="w-6 h-6 text-dark-900"></i>
        <span id="cartBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-danger text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-dark-900">0</span>
    </button>
</div>

<!-- Cart Overlay -->
<div id="cartOverlay" class="overlay hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm" onclick="toggleCart()"></div>

<!-- Cart Drawer -->
<div id="cartDrawer" class="cart-drawer closed fixed bottom-0 left-0 right-0 z-50 bg-dark-800 rounded-t-3xl border-t border-dark-600 shadow-float max-h-[80vh] flex flex-col">
    <div class="flex items-center justify-between px-5 py-4 border-b border-dark-600/50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center"><i data-lucide="receipt" class="w-5 h-5 text-accent"></i></div>
            <div><h3 class="font-bold text-white">Your Order</h3><p class="text-xs text-gray-400"><span id="cartCount">0</span> items</p></div>
        </div>
        <button onclick="toggleCart()" class="w-8 h-8 rounded-full bg-dark-700 flex items-center justify-center hover:bg-dark-600 transition-colors"><i data-lucide="x" class="w-4 h-4 text-gray-400"></i></button>
    </div>
    <div id="cartItems" class="flex-1 overflow-y-auto px-5 py-3 space-y-3"></div>
    <div id="emptyCart" class="flex-1 flex flex-col items-center justify-center py-10 px-5">
        <div class="w-16 h-16 rounded-2xl bg-dark-700 flex items-center justify-center mb-4"><i data-lucide="receipt" class="w-8 h-8 text-gray-600"></i></div>
        <p class="text-gray-400 text-sm">Your order is empty</p>
        <p class="text-gray-600 text-xs mt-1">Select items to see total cost</p>
    </div>
    <div id="cartFooter" class="border-t border-dark-600/50 px-5 py-4 space-y-3 hidden">
        <div class="flex items-center justify-between text-sm"><span class="text-gray-400">Subtotal</span><span class="text-white font-semibold" id="subtotal">0 DA</span></div>
        <button onclick="clearCart()" class="w-full py-3 rounded-xl bg-dark-700 text-danger text-sm font-semibold hover:bg-dark-600 transition-colors">Clear Order</button>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-50 px-4 py-3 bg-dark-800 border border-accent/30 rounded-xl shadow-float flex items-center gap-3 opacity-0 pointer-events-none transition-all duration-300 transform -translate-y-2">
    <div class="w-8 h-8 rounded-lg bg-accent/10 flex items-center justify-center"><i data-lucide="check" class="w-4 h-4 text-accent"></i></div>
    <div><p class="text-sm font-medium text-white" id="toastTitle">Added</p><p class="text-xs text-gray-400" id="toastMessage">Item added</p></div>
</div>

<script>
const menuData = {
    burgers: {
        title: "Burgers & Meals",
        icon: "beef",
        items: [
            { name: "EL SMASH", description: "Classic smash burger with secret sauce", simple: 650, double: 900, hasOptions: true, img: "https://kimi-web-img.moonshot.cn/img/www.shutterstock.com/751919310b61ed37abad3cf7a0f78d79537e67a0.jpg" },
            { name: "EL MOZZA", description: "Mozzarella stuffed patty with fresh basil", simple: 750, double: 1050, hasOptions: true, img: "https://kimi-web-img.moonshot.cn/img/potatorolls.com/5343a67325098b933f0d41a16a07cfd3d1f08205.jpg" },
            { name: "EL FUMADORI", description: "Smoky BBQ glazed beef patty", simple: 750, double: 1050, hasOptions: true, img: "https://kimi-web-img.moonshot.cn/img/img.taste.com.au/cba1fba4f82c66ae1eefc6eb6853d1d190851ab9.jpeg" },
            { name: "EDGY", description: "Spicy jalapeño and pepper jack cheese", simple: 750, double: 1050, hasOptions: true, img: "https://kimi-web-img.moonshot.cn/img/www.chilitochoc.com/266355ed1dfb569939b9fbd60f2048fb2c0d6370.jpg" },
            { name: "EL POLLO CRISPY", description: "Crispy fried chicken with coleslaw", simple: 600, double: 850, hasOptions: true, img: "https://kimi-web-img.moonshot.cn/img/www.recipetineats.com/c4bd352e55707b9ae78e8c8d06de4e96c26602f3.jpg" },
            { name: "DELEF POLLO", description: "Grilled chicken with herb marinade", simple: 650, double: 900, hasOptions: true, img: "https://kimi-web-img.moonshot.cn/img/simply-delicious-food.com/c8864d7b03279cc007ef7b91cddba6d9047b87a2.jpg" },
            { name: "MEXADO", description: "Mexican-style loaded burger with guacamole", price: 1200, hasOptions: false, img: "https://kimi-web-img.moonshot.cn/img/elrestaurante.com/a541c848abee0967c43c31d1654dc1f650ee0ff0.png" },
            { name: "El Pollo Champi", description: "Chicken with sautéed mushrooms and Swiss", simple: 800, double: 1100, hasOptions: true, img: "https://kimi-web-img.moonshot.cn/img/www.australianmushrooms.com.au/acdaf6db20b1347ce9fbb36f0f798cf0aeea67fc.jpg" }
        ]
    },
    sandwiches: {
        title: "Long Sandwiches",
        icon: "sandwich",
        items: [
            { name: "Thon", description: "Tuna salad with fresh vegetables", price: 500, img: "https://kimi-web-img.moonshot.cn/img/img.freepik.com/91e8d2d00aadd5488ae19cdad69b9c6c4eb7a292.jpg" },
            { name: "Crispy Chicken / Tenders", description: "Breaded chicken tenders with mayo", price: 620, img: "https://kimi-web-img.moonshot.cn/img/img.freepik.com/4a00520163df320f5979e4ee669a644f440c4644.jpg" },
            { name: "Kefta / Minced Meat", description: "Spiced minced meat with onions", price: 600, img: "https://kimi-web-img.moonshot.cn/img/st2.depositphotos.com/8df5d0c5a87873e601cb7d4061a6c0a2ebd0a51f.jpg" },
            { name: "Mixte", description: "Combination of tuna and chicken", price: 650, img: "https://kimi-web-img.moonshot.cn/img/impressiveplatters.com.au/3cb59cb4830a6a9ccccc6356f249c6072756d5be.jpg" },
            { name: "Spécial", description: "Chef's special loaded sandwich", price: 680, img: "https://kimi-web-img.moonshot.cn/img/stpierrebakery-co-uk.s3.eu-west-1.amazonaws.com/5d52945b4348b925591cf010b2caa0e7308e7d92.jpg" }
        ]
    },
    pizza: {
        title: "Pizza",
        icon: "pizza",
        items: [
            { name: "Pizza Pepperoni", description: "Classic pepperoni with mozzarella", price: 680, img: "https://kimi-web-img.moonshot.cn/img/thumbs.dreamstime.com/54bb030287721310f8cab8de7f68d475336cf61f.jpg" },
            { name: "Pizza 4 Saisons", description: "Four seasons with assorted toppings", price: 700, img: "https://kimi-web-img.moonshot.cn/img/streamofflavors.com/58e7c683e4e0568fe0355dda78ce4b64bb74a5ed.jpg" },
            { name: "Pizza Sauce Blanche", description: "White sauce base with chicken and mushrooms", price: 700, img: "https://kimi-web-img.moonshot.cn/img/www.kj.com/9598ee6a4511b4c5814d65632a2b940019130a40.jpg" },
            { name: "Pizza Fruits de Mer", description: "Seafood medley with garlic butter", price: 900, img: "https://kimi-web-img.moonshot.cn/img/img.freepik.com/3ce3eed4ea96b160807cc096ad72527dafbad601.jpg" },
            { name: "Pizza Carnivore", description: "Meat lovers with beef, chicken & pepperoni", price: 850, img: "https://kimi-web-img.moonshot.cn/img/tb-static.uber.com/f291e9ee68c884c189486793adb88e81417f4dc3.jpeg" }
        ]
    },
    supplements: {
        title: "Supplements & Drinks",
        icon: "glass-water",
        items: [
            { name: "Frites", description: "Crispy golden french fries", price: 150, img: "https://kimi-web-img.moonshot.cn/img/img.magnific.com/f2b3dea0c7d3ea7828eeca191d756eb8b9864903.jpg" },
            { name: "Frites au Fromage", description: "Cheese loaded fries", price: 250, img: "https://kimi-web-img.moonshot.cn/img/thumbs.dreamstime.com/41bde6ed3bb7880d6f25aba5e4e8cdabd5b44ff0.jpg" },
            { name: "Cannette", description: "Soft drink can", price: 120, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400&h=300&fit=crop" },
            { name: "Eau Minérale", description: "Mineral water bottle", price: 60, img: "https://kimi-web-img.moonshot.cn/img/4.imimg.com/402553408d7643c113b5898cd281a3e4dd16825f.jpeg" },
            { name: "Gruyère", description: "Extra Gruyère cheese slice", price: 150, img: "https://kimi-web-img.moonshot.cn/img/igourmet.com/384e2415f62df83ebda586893e69c316c2282c02.jpg" },
            { name: "Tenders", description: "Extra chicken tenders (2 pcs)", price: 150, img: "https://kimi-web-img.moonshot.cn/img/yishifoods.com/cca4fa788bf2594f76265187e050d35413f05150.jpg" },
            { name: "Gouda", description: "Extra Gouda cheese slice", price: 100, img: "https://kimi-web-img.moonshot.cn/img/static.vecteezy.com/b628f9b5565e0cbdd9ff5ceb467dcf2b2a5b104a.jpeg" },
            { name: "Oignon Caramelisé", description: "Caramelized onions topping", price: 50, img: "https://images.unsplash.com/photo-1626202378383-2413957d7785?w=400&h=300&fit=crop" }
        ]
    }
};

let cart = [];
let activeCategory = 'all';
let searchQuery = '';

document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    renderMenu();
    setupEventListeners();
});

function renderMenu() {
    const container = document.getElementById('menuContent');
    container.innerHTML = '';
    const categories = activeCategory === 'all' ? Object.keys(menuData) : [activeCategory];
    let hasResults = false;

    categories.forEach((catKey, catIndex) => {
        const category = menuData[catKey];
        const filteredItems = category.items.filter(item =>
            item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
            (item.description && item.description.toLowerCase().includes(searchQuery.toLowerCase()))
        );
        if (filteredItems.length === 0) return;
        hasResults = true;

        const section = document.createElement('section');
        section.className = 'mb-8 animate-fade-in-up';
        section.style.animationDelay = `${catIndex * 0.1}s`;
        section.id = `section-${catKey}`;
        section.innerHTML = `
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center">
                    <i data-lucide="${category.icon}" class="w-5 h-5 text-accent"></i>
                </div>
                <h2 class="section-title text-xl font-bold text-white">${category.title}</h2>
            </div>
            <div class="space-y-4" id="grid-${catKey}"></div>
        `;
        container.appendChild(section);

        const grid = section.querySelector(`#grid-${catKey}`);
        filteredItems.forEach((item, index) => {
            const card = createMenuCard(item, catKey, index);
            grid.appendChild(card);
        });
    });

    if (!hasResults) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 animate-fade-in-up">
                <div class="w-20 h-20 rounded-2xl bg-dark-700 flex items-center justify-center mb-4">
                    <i data-lucide="search-x" class="w-10 h-10 text-gray-600"></i>
                </div>
                <h3 class="text-lg font-semibold text-white mb-2">No items found</h3>
                <p class="text-sm text-gray-400 text-center">Try adjusting your search or browse all categories</p>
                <button onclick="clearSearch()" class="mt-4 px-6 py-2 rounded-full bg-accent text-dark-900 text-sm font-semibold hover:bg-accent-light transition-colors">View All Items</button>
            </div>
        `;
    }
    lucide.createIcons();
}

function createMenuCard(item, category, index) {
    const card = document.createElement('div');
    card.className = `menu-card bg-dark-800 rounded-2xl overflow-hidden border border-dark-600/50 animate-fade-in-up stagger-${(index % 8) + 1}`;

    if (item.hasOptions) {
        const itemId = `${category}-${item.name.replace(/\s+/g, '-').toLowerCase()}`;
        card.innerHTML = `
            <div class="relative h-44 overflow-hidden">
                <img src="${item.img}" alt="${item.name}" class="item-img w-full h-full object-cover" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&h=300&fit=crop'">
                <div class="img-overlay absolute inset-0"></div>
                <div class="absolute bottom-3 left-4 right-4">
                    <h3 class="font-bold text-white text-lg">${item.name}</h3>
                    <p class="text-xs text-gray-300 mt-0.5">${item.description}</p>
                </div>
            </div>
            <div class="p-4">
                <div class="flex items-center gap-2 mb-3">
                    <button class="toggle-btn active flex-1 py-2.5 rounded-xl text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600"
                            onclick="selectOption(this, '${itemId}', 'simple', ${item.simple}, '${item.name}', '${category}')">
                        Simple <span class="block text-sm font-bold mt-0.5">${item.simple} DA</span>
                    </button>
                    <button class="toggle-btn flex-1 py-2.5 rounded-xl text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600"
                            onclick="selectOption(this, '${itemId}', 'double', ${item.double}, '${item.name}', '${category}')">
                        Double <span class="block text-sm font-bold mt-0.5">${item.double} DA</span>
                    </button>
                </div>
                <button onclick="addToCartWithOption('${itemId}', '${item.name}', '${category}')"
                        class="add-btn w-full py-2.5 rounded-xl bg-dark-700 hover:bg-accent hover:text-dark-900 text-gray-300 text-sm font-semibold transition-all flex items-center justify-center gap-2 border border-dark-600 hover:border-accent">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    Add to Order
                </button>
            </div>
        `;
        card.dataset.selectedOption = 'simple';
        card.dataset.selectedPrice = item.simple;
    } else {
        card.innerHTML = `
            <div class="flex gap-4 p-4">
                <div class="w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 border border-dark-600/50">
                    <img src="${item.img}" alt="${item.name}" class="item-img w-full h-full object-cover" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&h=300&fit=crop'">
                </div>
                <div class="flex-1 flex flex-col justify-between min-w-0">
                    <div>
                        <h3 class="font-bold text-white text-base">${item.name}</h3>
                        <p class="text-xs text-gray-400 mt-0.5 line-clamp-2">${item.description}</p>
                    </div>
                    <div class="flex items-center justify-between mt-2">
                        <span class="price-tag px-3 py-1 rounded-lg text-accent font-bold text-sm">${item.price} DA</span>
                        <button onclick="addToCart('${item.name}', ${item.price}, '${category}')"
                                class="add-btn w-10 h-10 rounded-xl bg-dark-700 hover:bg-accent hover:text-dark-900 text-gray-300 flex items-center justify-center transition-all border border-dark-600 hover:border-accent">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }
    return card;
}

function selectOption(btn, itemId, option, price, name, category) {
    const card = btn.closest('.menu-card');
    const buttons = card.querySelectorAll('.toggle-btn');
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    card.dataset.selectedOption = option;
    card.dataset.selectedPrice = price;
}

function addToCartWithOption(itemId, name, category) {
    const card = document.querySelector(`[onclick*="${itemId}"]`).closest('.menu-card');
    const option = card.dataset.selectedOption;
    const price = parseInt(card.dataset.selectedPrice);
    const fullName = `${name} (${option.charAt(0).toUpperCase() + option.slice(1)})`;
    addToCart(fullName, price, category);
}

function addToCart(name, price, category) {
    const existingItem = cart.find(item => item.name === name);
    if (existingItem) {
        existingItem.quantity++;
    } else {
        cart.push({ name, price, quantity: 1, category });
    }
    updateCart();
    showToast('Added to order', `${name} — ${price} DA`);
}

function removeFromCart(index) {
    cart.splice(index, 1);
    updateCart();
}

function updateQuantity(index, delta) {
    cart[index].quantity += delta;
    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }
    updateCart();
}

function clearCart() {
    cart = [];
    updateCart();
    toggleCart();
}

function updateCart() {
    const cartItems = document.getElementById('cartItems');
    const emptyCart = document.getElementById('emptyCart');
    const cartFooter = document.getElementById('cartFooter');
    const cartFAB = document.getElementById('cartFAB');
    const cartBadge = document.getElementById('cartBadge');
    const cartCount = document.getElementById('cartCount');
    const subtotal = document.getElementById('subtotal');

    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

    cartBadge.textContent = totalItems;
    cartCount.textContent = totalItems;

    if (totalItems > 0) {
        cartFAB.classList.remove('hidden');
        cartBadge.classList.add('badge-pulse');
        setTimeout(() => cartBadge.classList.remove('badge-pulse'), 300);

        emptyCart.classList.add('hidden');
        cartFooter.classList.remove('hidden');
        subtotal.textContent = `${totalPrice} DA`;

        cartItems.innerHTML = cart.map((item, index) => `
            <div class="flex items-center gap-3 bg-dark-700/50 rounded-xl p-3 animate-slide-down">
                <div class="flex-1 min-w-0">
                    <h4 class="text-sm font-semibold text-white truncate">${item.name}</h4>
                    <p class="text-xs text-accent font-medium">${item.price} DA each</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="updateQuantity(${index}, -1)" class="qty-btn w-7 h-7 rounded-lg bg-dark-600 flex items-center justify-center text-gray-400 hover:text-white hover:bg-dark-500">
                        <i data-lucide="minus" class="w-3 h-3"></i>
                    </button>
                    <span class="text-sm font-bold text-white w-6 text-center">${item.quantity}</span>
                    <button onclick="updateQuantity(${index}, 1)" class="qty-btn w-7 h-7 rounded-lg bg-dark-600 flex items-center justify-center text-gray-400 hover:text-white hover:bg-dark-500">
                        <i data-lucide="plus" class="w-3 h-3"></i>
                    </button>
                </div>
                <button onclick="removeFromCart(${index})" class="w-7 h-7 rounded-lg bg-danger/10 flex items-center justify-center text-danger hover:bg-danger/20 ml-1">
                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                </button>
            </div>
        `).join('');

        lucide.createIcons();
    } else {
        cartFAB.classList.add('hidden');
        emptyCart.classList.remove('hidden');
        cartFooter.classList.add('hidden');
        cartItems.innerHTML = '';
    }
}

function toggleCart() {
    const drawer = document.getElementById('cartDrawer');
    const overlay = document.getElementById('cartOverlay');
    const body = document.body;

    if (drawer.classList.contains('closed')) {
        drawer.classList.remove('closed');
        drawer.classList.add('open');
        overlay.classList.remove('hidden');
        overlay.classList.add('visible');
        body.classList.add('cart-open');
    } else {
        drawer.classList.remove('open');
        drawer.classList.add('closed');
        overlay.classList.remove('visible');
        overlay.classList.add('hidden');
        body.classList.remove('cart-open');
    }
}

function showToast(title, message) {
    const toast = document.getElementById('toast');
    const toastTitle = document.getElementById('toastTitle');
    const toastMessage = document.getElementById('toastMessage');

    toastTitle.textContent = title;
    toastMessage.textContent = message;

    toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-2');
    toast.classList.add('opacity-100', 'translate-y-0');

    setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2');
        toast.classList.remove('opacity-100', 'translate-y-0');
    }, 2500);
}

function setupEventListeners() {
    document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeCategory = tab.dataset.category;
            renderMenu();
        });
    });

    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');

    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        clearBtn.classList.toggle('hidden', !searchQuery);
        renderMenu();
    });

    clearBtn.addEventListener('click', clearSearch);
}

function clearSearch() {
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');
    searchInput.value = '';
    searchQuery = '';
    clearBtn.classList.add('hidden');
    renderMenu();
}
</script>
</body>
</html>
